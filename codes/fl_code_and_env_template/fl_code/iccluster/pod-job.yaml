apiVersion: batch/v1
kind: Job
metadata:
  name: lin-job-2021-fl-0506-03
  labels:
    app: lin-worker
    user: lin
spec:
  template:
    metadata:
      labels:
        app: lin-worker
        user: lin
    spec:
      restartPolicy: Never
      containers:
        - name:  lin-worker
          image: ic-registry.epfl.ch/mlo/lin-pytorch:1.8.0
          workingDir: /mlodata1/tlin/fl_sampling
          imagePullPolicy: Always
          env:
            - name: ROLE
              value: worker
            - name: JOBMONITOR_TIMESERIES_HOST
              value: lin-timeseries
            - name: JOBMONITOR_METADATA_HOST
              value: lin-metadata
          volumeMounts:
            - mountPath: /mlodata1
              name: mlodata
            - mountPath: /dev/shm
              name: dshm
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: 48
            requests:
              nvidia.com/gpu: 1
              cpu: 48
          command: ["/bin/sh", "-c"]
          args: [
            "/usr/local/bin/entrypoint.sh && python run_exps.py --script_path exps/importance_sampling_mlp/client100_ratio01_1.py --num_jobs_per_node 2"
          ]
      volumes:
        - name: mlodata
          persistentVolumeClaim:
            claimName: pv-mloraw1
        - name: dshm
          emptyDir:
            medium: Memory
  backoffLimit: 0
